
    <!DOCTYPE html>
    <html lang="tr">
    <head><meta charset="UTF-8"><title>ORAK-AI | COMMAND CENTER</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #020202; color: #00ffcc; font-family: 'Courier New', monospace; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .panel { background: rgba(0, 255, 204, 0.05); border: 2px solid #00ffcc; border-radius: 15px; padding: 20px; width: 90%; max-width: 600px; box-shadow: 0 0 20px #00ffcc33; }
        .header { display: flex; justify-content: space-between; font-size: 0.8rem; border-bottom: 1px solid #00ffcc; padding-bottom: 10px; margin-bottom: 20px; }
        .stat-bar { background: #111; height: 10px; border-radius: 5px; margin: 10px 0; overflow: hidden; border: 1px solid #333; }
        .stat-fill { background: #00ffcc; height: 100%; width: 33%; box-shadow: 0 0 10px #00ffcc; transition: 1s; }
        .ai-msg { font-style: italic; color: #fff; background: #111; padding: 15px; border-radius: 10px; border-left: 5px solid #00ffcc; margin: 20px 0; }
        canvas { max-height: 150px; margin-top: 10px; }
        .btn { background: transparent; color: #00ffcc; border: 1px solid #00ffcc; padding: 10px; width: 100%; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .btn:hover { background: #00ffcc; color: black; }
    </style></head>
    <body>
        <div class="panel">
            <div class="header"><span>📡 ORAK-AI v3.0</span> <span>🕒 22:22</span></div>
            <div style="font-size: 0.7rem;">SİSTEM ENERJİSİ: %33</div>
            <div class="stat-bar"><div class="stat-fill"></div></div>
            
            <div class="ai-msg" id="msg">"Siber tünellerde veri akışı devam ediyor patron."</div>
            
            <canvas id="brainChart"></canvas>
            <br>
            <button class="btn" onclick="seslen()">🔊 VERİ PAKETİNİ SESLENDİR</button>
        </div>

        <script>
            function seslen() {
                var u = new SpeechSynthesisUtterance(document.getElementById('msg').innerText);
                u.lang = 'tr-TR'; window.speechSynthesis.speak(u);
            }
            const ctx = document.getElementById('brainChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['1', '2', '3', '4', '5', '6'],
                    datasets: [{
                        label: 'AI BEYİN DALGASI',
                        data: [34, 54, 52, 78, 72, 46],
                        borderColor: '#00ffcc',
                        tension: 0.4,
                        fill: false
                    }]
                },
                options: { plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { display: false } } }
            });
        </script>
    </body></html>
