
    <!DOCTYPE html>
    <html lang="tr">
    <head><meta charset="UTF-8"><title>ORAK-AI | SESLI KOMUT</title>
    <style>
        body { background: #000; color: #00ffcc; font-family: monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; text-align: center; }
        .core { border: 2px solid #00ffcc; padding: 50px; border-radius: 50%; box-shadow: 0 0 30px #00ffcc44; }
        .mic-btn { background: #00ffcc; border: none; width: 80px; height: 80px; border-radius: 50%; cursor: pointer; font-size: 2rem; }
        #durum { margin-top: 20px; font-size: 0.8rem; color: #fff; }
    </style></head>
    <body>
        <div class="core">
            <div style="font-size:0.7rem;">00:01</div>
            <button class="mic-btn" onclick="dinle()">🎤</button>
            <p id="durum">SESINI DUYMAK ICIN BUTONA BAS</p>
            <p id="cevap" style="font-style:italic;">"Sistem çevrimiçi, emirlerini bekliyorum patron."</p>
        </div>

        <script>
            // SESLENME FONKSİYONU
            function speak(text) {
                var u = new SpeechSynthesisUtterance(text);
                u.lang = 'tr-TR'; 
                window.speechSynthesis.speak(u);
            }

            // DİNLEME FONKSİYONU (Robotun Kulakları Burada Açılıyor)
            function dinle() {
                var recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
                recognition.lang = 'tr-TR';
                
                recognition.onstart = function() {
                    document.getElementById('durum').innerText = "🎤 DİNLİYORUM, KONUŞ PATRON...";
                };

                recognition.onerror = function(event) {
                    document.getElementById('durum').innerText = "❌ HATA: " + event.error;
                    alert("Mikrofon izni vermemiş olabilirsin patron!");
                };

                recognition.onresult = function(event) {
                    var transcript = event.results[0][0].transcript;
                    document.getElementById('durum').innerText = "ANLAŞILDI: " + transcript;
                    speak("Anladım patron: " + transcript);
                };

                recognition.start();
            }

            // Sayfa açıldığında AI'nın cevabını sesli oku
            window.onload = function() { speak(document.getElementById('cevap').innerText); };
        </script>
    </body></html>
