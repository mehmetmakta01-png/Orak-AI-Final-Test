
    <!DOCTYPE html>
    <html lang="tr">
    <head><meta charset="UTF-8"><title>ORAK-AI | GLOBAL HUB</title>
    <style>
        body { background: #010101; color: #00ffcc; font-family: 'Courier New', monospace; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .monitor { border: 3px solid #00ffcc; border-radius: 20px; padding: 20px; width: 95%; max-width: 700px; box-shadow: inset 0 0 50px #00ffcc22, 0 0 30px #00ffcc44; position: relative; overflow: hidden; }
        .map-area { background: url('https://upload.wikimedia.org/wikipedia/commons/e/ec/World_map_blank_without_borders.svg') no-repeat center; background-size: contain; height: 250px; position: relative; opacity: 0.4; border: 1px solid #111; margin: 15px 0; }
        .dot { position: absolute; width: 6px; height: 6px; background: #00ffcc; border-radius: 50%; box-shadow: 0 0 15px #00ffcc; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(3); opacity: 0; } }
        .header { display: flex; justify-content: space-between; border-bottom: 2px solid #00ffcc; padding-bottom: 5px; font-weight: bold; }
        .ai-note { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; margin: 15px 0; border-right: 4px solid #00ffcc; color: #eee; font-style: italic; }
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 0.8rem; }
        .btn-active { background: #00ffcc; color: #000; border: none; padding: 12px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style></head>
    <body>
        <div class="monitor">
            <div class="header"><span>🌍 GLOBAL DATA STREAM</span> <span>🕒 22:32</span></div>
            <div class="map-area"><div class="dot" style="left:37%; top:38%"></div><div class="dot" style="left:54%; top:29%"></div><div class="dot" style="left:36%; top:50%"></div><div class="dot" style="left:78%; top:29%"></div><div class="dot" style="left:50%; top:26%"></div></div>
            <div class="stats">
                <div>📡 AKTİF DÜĞÜM: 99</div>
                <div>⚡ SİSTEM GÜCÜ: %61</div>
            </div>
            <div class="ai-note" id="vizyon-text">"Küresel ağlar üzerinde veri fırtınası bekleniyor patron."</div>
            <button class="btn-active" onclick="speak()">🔊 STRATEJİK ANALİZİ DİNLE</button>
        </div>
        <script>
            function speak() {
                var msg = new SpeechSynthesisUtterance(document.getElementById('vizyon-text').innerText);
                msg.lang = 'tr-TR'; window.speechSynthesis.speak(msg);
            }
        </script>
    </body></html>
