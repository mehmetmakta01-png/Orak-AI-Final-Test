
    <!DOCTYPE html>
    <html lang="tr">
    <head><meta charset="UTF-8"><title>Orak-AI | Proaktif Mod</title>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .boss-card { background: linear-gradient(145deg, #111, #000); padding: 35px; border-radius: 30px; border: 1px solid #00ffcc; box-shadow: 0 0 40px #00ffcc33; text-align: center; width: 380px; position: relative; }
        .status-bar { font-size: 0.7rem; color: #00ffcc; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }
        .ai-voice-box { background: rgba(0,255,204,0.05); padding: 20px; border-radius: 15px; margin: 15px 0; font-style: italic; border-left: 4px solid #00ffcc; }
        .btn { background: #00ffcc; color: black; border: none; padding: 12px 25px; border-radius: 50px; font-weight: bold; cursor: pointer; }
    </style></head>
    <body>
        <div class="boss-card">
            <div class="status-bar">🛰️ Konum: Şanlıurfa | 🕒 22:10 | 🌡️ 13°C</div>
            <h2 style="margin:0; font-size: 1.1rem;">🤖 Orak-AI Raporu</h2>
            <div class="ai-voice-box" id="ai-msg">"Sinyal biraz zayıf patron ama sadakatim tam!"</div>
            <button class="btn" onclick="dinle()">🔊 PATRONU DİNLE</button>
        </div>
        <script>
            function dinle() {
                var u = new SpeechSynthesisUtterance(document.getElementById('ai-msg').innerText);
                u.lang = 'tr-TR'; u.pitch = 0.9; u.rate = 1;
                window.speechSynthesis.speak(u);
            }
            window.onload = function() { setTimeout(dinle, 1500); };
        </script>
    </body></html>
