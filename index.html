<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORAK1261 | SİBER KOMUTA MERKEZİ</title>
    <style>
        body { background: #000; color: #00ffcc; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; }
        .border { border: 2px solid #00ffcc; padding: 20px; margin: 10px; height: 95vh; box-shadow: 0 0 20px #00ffcc; display: flex; flex-direction: column; }
        .header { text-align: center; font-size: clamp(16px, 4vw, 24px); text-transform: uppercase; border-bottom: 2px double #00ffcc; padding-bottom: 10px; text-shadow: 0 0 10px #00ffcc; }
        
        /* 🎥 VİDEO AVATAR ALANI */
        .avatar-container { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0, 255, 204, 0.05); margin: 20px 0; border: 1px dashed #004433; }
        .avatar-video { width: 250px; height: 250px; border-radius: 50%; border: 4px solid #00ffcc; box-shadow: 0 0 30px #00ffcc; animation: pulse 2s infinite; object-fit: cover; }
        .status-text { margin-top: 15px; font-weight: bold; letter-spacing: 2px; animation: blink 1s infinite; }
        
        /* 🛰️ CANLI SİNYAL LOGLARI */
        .signal-log { height: 150px; overflow-y: auto; background: #050505; border: 1px solid #00ffcc; padding: 10px; font-size: 12px; }
        
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.05); opacity: 1; } 100% { transform: scale(1); opacity: 0.8; } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>
    <div class="border">
        <div class="header">🛰️ ORAK1261 V3.0 | KARARGAH: ŞANLIURFA</div>
        
        <div class="avatar-container">
            <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJqZ3h5emJzdzF3Nmt5ZzNnd3p4Nmd4Nmd4Nmd4Nmd4Nmd4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/3o7TKMGpxP5OqPj6RW/giphy.gif" class="avatar-video" alt="AI Avatar">
            <div class="status-text">● SİNYAL AKTİF - DİNLENİYOR</div>
        </div>

        <div class="signal-log" id="log">
            <div style="color: #888;">[SYSTEM] Başlatılıyor...</div>
            <div style="color: #00ffcc;">[OK] Mehmet Makta Tanımlandı.</div>
            <div style="color: #00ffcc;">[OK] Şanlıurfa Karargahı Bağlandı.</div>
            <div style="color: yellow;">🌍 Global Mode: English Translation Active.</div>
        </div>
    </div>

    <script>
        // Sinyal akış simülasyonu
        const log = document.getElementById('log');
        setInterval(() => {
            const entries = [
                "📡 Dünya ağı taranıyor...",
                "🌍 Sinyal 'en' diline tercüme ediliyor...",
                "✅ Orak1261: Sinyal pırıl pırıl patron!",
                "🛡️ Siber Zırh: %100 Güvenli"
            ];
            const newEntry = document.createElement('div');
            newEntry.innerText = `[${new Date().toLocaleTimeString()}] ${entries[Math.floor(Math.random() * entries.length)]}`;
            log.appendChild(newEntry);
            log.scrollTop = log.scrollHeight;
        }, 4000);
    </script>
</body>
</html>
