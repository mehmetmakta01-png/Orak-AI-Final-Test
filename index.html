
    <!DOCTYPE html>
    <html lang="tr">
    <head><meta charset="UTF-8"><title>ORAK-AI | KOMUTA</title>
    <style>
        body { background: #000; color: #00ffcc; font-family: monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; text-align: center; }
        .core { border: 2px solid #00ffcc; padding: 40px; border-radius: 20px; box-shadow: 0 0 30px #00ffcc44; width: 300px; }
        .mic-btn { background: #00ffcc; border: none; width: 70px; height: 70px; border-radius: 50%; cursor: pointer; font-size: 1.5rem; }
        #durum { margin-top: 15px; font-size: 0.8rem; color: #fff; }
    </style></head>
    <body>
        <div class="core">
            <div style="font-size:0.7rem; margin-bottom:10px;">🕒 11:44</div>
            <button class="mic-btn" onclick="dinle()">🎤</button>
            <p id="durum">SESINI DUYMAK ICIN BUTONA BAS</p>
            <p id="cevap" style="font-style:italic; border-top: 1px solid #333; padding-top: 10px;">"Sistem çevrimiçi, emirlerini bekliyorum patron."</p>
        </div>

        <script>
            function speak(text) {
                var u = new SpeechSynthesisUtterance(text);
                u.lang = 'tr-TR'; window.speechSynthesis.speak(u);
            }

            function dinle() {
                var recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
                recognition.lang = 'tr-TR';
                
                recognition.onstart = function() {
                    document.getElementById('durum').innerText = "🎤 DİNLİYORUM...";
                };

                recognition.onresult = function(event) {
                    var transcript = event.results[0][0].transcript;
                    document.getElementById('durum').innerText = "ANLAŞILDI: " + transcript;
                    speak("Anladım patron: " + transcript);
                };

                recognition.onerror = function(event) {
                    document.getElementById('durum').innerText = "❌ HATA: " + event.error;
                };

                recognition.start();
            }
            window.onload = function() { speak(document.getElementById('cevap').innerText); };
        </script>
    </body></html>
