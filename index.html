
    <!DOCTYPE html>
    <html lang="tr">
    <head><meta charset="UTF-8"><title>ORAK-AI | V8 STRONG</title>
    <style>
        body { background: #000; color: #00ffcc; font-family: 'Courier New', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .shield { border: 3px solid #00ffcc; padding: 30px; border-radius: 25px; box-shadow: 0 0 50px #00ffcc33; text-align: center; width: 320px; position: relative; }
        .mic-btn { background: #00ffcc; border: none; width: 80px; height: 80px; border-radius: 50%; cursor: pointer; font-size: 2rem; box-shadow: 0 0 20px #00ffcc; }
        #status { margin-top: 20px; font-weight: bold; font-size: 0.9rem; }
        .pulse { animation: pulse-ring 1.5s cubic-bezier(0.215, 0.61, 0.355, 1) infinite; }
        @keyframes pulse-ring { 0% { transform: scale(.33); } 80%, 100% { opacity: 0; } }
    </style></head>
    <body>
        <div class="shield">
            <div style="font-size:0.7rem; color:#444;">🛡️ SİBER ZIRH AKTİF | 13:06</div>
            <br>
            <button class="mic-btn pulse" onclick="dinle()">🎤</button>
            <p id="status">KOMUT BEKLENİYOR...</p>
            <div style="font-style:italic; color:#fff; border-top: 1px solid #111; padding-top:15px;">"Sinyal zayıf ama sadakatim tam patron!"</div>
        </div>

        <script>
            function speak(t) {
                var u = new SpeechSynthesisUtterance(t); u.lang='tr-TR'; window.speechSynthesis.speak(u);
            }
            function dinle() {
                var rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
                rec.lang = 'tr-TR';
                rec.onstart = () => { document.getElementById('status').innerText = "📡 DİNLİYORUM..."; };
                rec.onerror = (e) => { 
                    if(e.error === 'not-allowed') alert("Patron! Adres çubuğundaki KİLİT 🔒 simgesine bas ve MİKROFONA İZİN VER!");
                    document.getElementById('status').innerText = "❌ HATA: " + e.error; 
                };
                rec.onresult = (e) => {
                    var t = e.results[0][0].transcript;
                    document.getElementById('status').innerText = "EMİR: " + t;
                    speak("Emredersiniz patron: " + t);
                };
                rec.start();
            }
            window.onload = () => { speak("Sistem güçlendirildi patron. Bağlantı stabil."); };
        </script>
    </body></html>
