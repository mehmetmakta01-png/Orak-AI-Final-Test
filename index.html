
    <!DOCTYPE html>
    <html lang="tr">
    <head>
        <meta charset="UTF-8">
        <title>Mehmet Social</title>
        <style>
            body { background: #0a0a0a; color: white; font-family: sans-serif; text-align: center; padding-top: 50px; }
            .card { background: #161616; padding: 30px; border-radius: 25px; display: inline-block; border: 2px solid #444; }
            .btn { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-top: 20px; }
            .chat { background: #222; margin: 20px auto; width: 300px; padding: 15px; border-radius: 15px; text-align: left; }
        </style>
    </head>
    <body>
        <div class="card">
            <h1>🌐 Mehmet Social</h1>
            <p>Enerji Skoru: %30</p>
            <button class="btn">Arkadaş Ekle</button>
            <div class="chat">
                <b>Sohbet:</b><br>
                <small>Yapay İşçi: Sistem Hazır!</small>
            </div>
        </div>
    </body>
    </html>
