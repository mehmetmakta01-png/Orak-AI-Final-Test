
    <!DOCTYPE html>
    <html lang="tr">
    <head><meta charset="UTF-8"><title>Orak-AI | Canlı & Sesli</title>
    <style>
        body { background: #050505; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .main-card { background: #111; padding: 30px; border-radius: 25px; border: 1px solid #00ffcc; box-shadow: 0 0 40px #00ffcc44; text-align: center; width: 350px; }
        h2 { color: #00ffcc; font-size: 1rem; margin-bottom: 20px; text-transform: uppercase; }
        .chat-area { background: #000; padding: 15px; border-radius: 15px; margin-bottom: 20px; min-height: 80px; border-left: 3px solid #00ffcc; }
        input { width: 80%; padding: 10px; border-radius: 10px; border: 1px solid #333; background: #1a1a1a; color: white; margin-bottom: 10px; }
        .btn-group { display: flex; gap: 10px; justify-content: center; }
        button { background: #00ffcc; color: black; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .voice-btn { background: transparent; border: 1px solid #00ffcc; color: #00ffcc; }
    </style></head>
    <body>
        <div class="main-card">
            <h2>🤖 Orak-AI Terminal</h2>
            <div class="chat-area">
                <small style="color:#666">Son Soru: Geleceğin dünyası nasıl olacak?</small>
                <p id="ai-text" style="font-size: 0.95rem; line-height: 1.4;">Bağlantı tünelinde bir parazit var patron, ama sinyal alıyorum!</p>
            </div>
            <input type="text" placeholder="Yeni bir şey sor..." id="user-input">
            <div class="btn-group">
                <button onclick="gonder()">GÖNDER</button>
                <button class="voice-btn" onclick="konus()">🔊 DİNLE</button>
            </div>
        </div>

        <script>
            function konus() {
                var msg = new SpeechSynthesisUtterance();
                msg.text = document.getElementById('ai-text').innerText;
                msg.lang = 'tr-TR';
                window.speechSynthesis.speak(msg);
            }
            function gonder() {
                alert("Mesajın Pydroid terminaline iletildi patron! AI yanıtı hazırlıyor...");
            }
        </script>
    </body></html>
