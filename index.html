
    <!DOCTYPE html>
    <html lang="tr">
    <head><meta charset="UTF-8"><title>ORAK-AI | OBSERVER v6</title>
    <style>
        body { background: #000; color: #00ffcc; font-family: 'Courier New', monospace; margin: 0; padding: 10px; display: grid; grid-template-columns: 1fr 2fr; gap: 15px; height: 100vh; }
        .sidebar { border-right: 2px solid #00ffcc; padding-right: 15px; }
        .main-view { position: relative; padding: 10px; }
        .weather-box { background: rgba(0,255,204,0.1); padding: 15px; border-radius: 15px; text-align: center; border: 1px solid #00ffcc; margin-bottom: 20px; }
        .ai-art-card { border: 1px solid #333; padding: 10px; border-radius: 10px; background: #050505; }
        .ai-art-card img { width: 100%; border-radius: 5px; opacity: 0.7; border: 1px solid #00ffcc; }
        .glitch-text { animation: glitch 2s infinite; font-weight: bold; font-size: 1.2rem; }
        @keyframes glitch { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .btn { background: #00ffcc; color: #000; border: none; padding: 10px; width: 100%; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style></head>
    <body>
        <div class="sidebar">
            <div class="weather-box">
                <div style="font-size: 2.5rem;">🌙</div>
                <div style="font-size: 1.5rem; font-weight: bold;">10°C</div>
                <div style="font-size: 0.7rem;">KONUM: ŞANLIURFA</div>
            </div>
            <h3>📊 PİYASA SİNYALİ</h3>
            <div class="glitch-text">USD: 33.13 TL</div>
            <hr style="border-color:#111">
            <div class="ai-art-card">
                <p style="font-size:0.7rem; color:#666">AI VİZYON ÇIKTISI:</p>
                <img src="https://picsum.photos/seed/512/300/200?grayscale" alt="AI Art">
                <p style="font-size:0.8rem; text-align:center;">"Siber Veri Akışı"</p>
            </div>
        </div>

        <div class="main-view">
            <h2 style="border-bottom: 2px solid #00ffcc;">📡 SİBER GÖZLEMCİ KOMUTASI</h2>
            <div style="background: #111; padding: 20px; border-radius: 10px; min-height: 100px;">
                <p id="status-msg" style="color:#fff; line-height: 1.6;">"Sistem aktif patron. Şanlıurfa semaları 10 derece. Piyasa dalgalanmaları AI tarafından analiz ediliyor. Strateji: Sabır ve Veri."</p>
            </div>
            <br>
            <button class="btn" onclick="speak()">🔊 DURUM RAPORUNU DİNLE</button>
            <div style="position: absolute; bottom: 20px; right: 20px; font-size: 0.8rem;">🕒 SON GÜNCELLEME: 23:28</div>
        </div>

        <script>
            function speak() {
                var msg = new SpeechSynthesisUtterance(document.getElementById('status-msg').innerText);
                msg.lang = 'tr-TR'; window.speechSynthesis.speak(msg);
            }
        </script>
    </body></html>
